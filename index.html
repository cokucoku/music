<!doctype html>
<html>

<head>
  <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" href="https://at.alicdn.com/t/font_1468805_e4ww4tlwoob.css">
  <link rel="stylesheet" href="slider.css">
  <title>[实战]54音乐播放器</title>
  <style>
  * {
    margin: 0px;
    padding: 0px;
    list-style: none;
    box-sizing: border-box;
  }

  .music-top {
    height: 86vh;
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .topn {
    width: 80%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .geci {
    width: calc(100% - 342px);
    height: 60vh;
    text-align: center;
    color: #fff;
    overflow: hidden;
    line-height: 42px;
  }

  .geci ul, .geci li {
    transition: all .5s
  }

  .geci ul {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .geci .cur {
    color: #3eaf7c;
    transform: scale(1.5);
  }

  .music-bottom {
    height: 14vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 3;
  }

  .bgimg {
    position: absolute;
    left: 0px;
    top: 0px;
    width: 100%;
    height: 100%;
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    filter: blur(15px);
    opacity: .6;
  }

  .bgmark {
    background-color: rgba(0, 0, 0, .35);
    z-index: 2;
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
  }

  body {
    background: #888;
  }

  .mark {
    background-color: rgba(0, 0, 0, .35);
    z-index: 4;
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    transition: all .3s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .musiclist {
    position: fixed;
    width: 300px;
    height: 100vh;
    left: 0;
    top: 0;
    background: #222;
    z-index: 5;
    transition: all .3s cubic-bezier(0.77, 0, 0.175, 1);
    transform: translateX(-100%);
    color: #eee
  }

  .musiclist .list {
    height: calc(100vh - 62px);
    overflow-y: auto
  }

  ::-webkit-scrollbar {
    width: 10px;
    /*高宽分别对应横竖滚动条的尺寸*/
    height: 1px;
  }

  ::-webkit-scrollbar-thumb {
    /*滚动条里面小方块*/
    border-radius: 10px;
    -webkit-box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
    background: #3eaf7c;
  }

  ::-webkit-scrollbar-track {
    /*滚动条里面轨道*/
    background: #333;
  }

  .musiclist li {
    display: flex;
    flex-direction: column;
    border-bottom: solid 1px #444;
    padding: 15px 20px 15px;
    cursor: pointer;
  }

  .musiclist.exp {
    transform: translateX(0%);
  }

  .musiclist .ti {
    padding: 20px 20px;
    color: #3eaf7c;
    border-bottom: solid 1px #444;
  }

  .musiclist .ti i {
    font-size: 12px;
    font-style: normal;
    margin-left: 4px;
    color: #aaa
  }

  .musiclist li .name {
    font-size: 14px;
    height: 14px;
    line-height: 14px;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  .musiclist li .name img {
    margin-left: 5px;
  }

  .musiclist li .authortime {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    height: 12px;
    line-height: 12px;
    margin-top: 10px;
  }

  .musiclist li .author {
    color: #aaa
  }

  .musiclist li .time {
    color: #666
  }

  .musiclist li.cur {
    background: #000
  }

  .musiclist li.cur,
  .musiclist li.cur .author,
  .musiclist li.cur .time {
    color: #3eaf7c
  }


  .music {
    display: flex;
    align-items: center;
    color: #eee;
    width: 80%;
  }

  .iconfont {
    font-size: 22px;
    transition: all .2s
  }

  .music .iconfont {
    margin-right: 30px;
    flex-shrink: 0;
    cursor: pointer;
  }

  .music .iconfont:hover {
    color: #3eaf7c
  }

  .music .musicinfo {
    margin-right: 30px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  .music .musicinfo .info {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    line-height: 14px;
    height: 14px;
    margin-bottom: 12px;
  }

  .music .musicinfo .time em {
    font-style: normal;
  }

  .music #icolist {
    color: #3eaf7c
  }

  .music #icolist i {
    font-style: normal;
    font-size: 12px;
  }


  #volume {
    width: 50px;
  }

  .cpj {
    width: 342px;
  }

  .cpjn {
    border-radius: 100%;
    width: 100%;
    height: 0;
    padding-bottom: 100%;
    background: linear-gradient(30deg, transparent 40%, rgba(42, 41, 40, .85) 40%) no-repeat 100% 0, linear-gradient(60deg, rgba(42, 41, 40, .85) 60%, transparent 60%) no-repeat 0 100%, repeating-radial-gradient(#2a2928, #2a2928 4px, #ada9a0 5px, #2a2928 6px);
    background-size: 50% 100%, 100% 50%, 100% 100%;
    box-shadow: 0 0 13px rgba(0, 0, 0, .9);
    animation: rotate 16s infinite linear;
    animation-play-state: paused;
  }

  #pic {
    width: 50%;
    height: 50%;
    border-radius: 100%;
    margin: 25%;
    border: solid 4px #3eaf7c;
    object-fit: cover;
    position: absolute;
  }

  .myu-enter,
  .myu-leave-to {
    opacity: 0;
  }

  .myu-enter-to,
  .myu-leave {
    opacity: 1;
  }

  @media (max-width: 768px) {
    .iconfont {
      font-size: 14px;
    }

    .cpj {
      width: 50%;
      margin-top: 9vh;
    }

    .topn {
      flex-direction: column;
      height: 100%;
    }

    .geci {
      height: 50vh;
      width: 100%;
    }

    .music .iconfont {
      margin-right: 15px;
    }

    .music .musicinfo {
      margin-right: 15px;
    }

    .music .musicinfo .info {
      display: none
    }

  }

  @keyframes rotate {
    from {
      transform: rotate(0deg);
    }

    to {
      transform: rotate(360deg);
    }
  }
  </style>
</head>

<body>
<div class="musicct">
  <div class="bgmark" v-if="music.length>0"></div>
  <div class="bgimg" v-if="music.length>0" :style="'background-image:url('+music[xh].cover+')'"></div>
  <div class="musiclist" :class="{exp:exp}">
    <div class="ti">播放列表<i>{{music.length}}首歌曲</i></div>
    <div class="list" v-if="music.length>0">
      <ul>
        <li v-for="(item,inx) in music" :class="{cur:inx==xh}" @click.stop="play(inx)">
          <div class="name">{{item.name}}<img src="playing.gif" v-if="inx==xh&&play"></div>
          <div class="authortime">
            <div class="author">{{item.author}}</div>
            <div class="time">{{formatTime(item.duration)}}</div>
          </div>
        </li>
      </ul>
    </div>
  </div>
  <transition name="myu">
    <div class="mark" v-if="exp" @click="exp=false"></div>
  </transition>
  <div class="music-top">
    <div class="topn">
      <div class="cpj" v-if="music.length>0">
        <div class="cpjn" :style="thestyle">
          <img id="pic" :src="music[xh].cover">
        </div>
      </div>
      <div class="geci">
        <ul :style="'transform:translateY('+scrollY+'px)'" v-if="lrcText.length>0">
          <li v-for="(item,xh) in lrcText" :key="xh" :class="{cur:item.cur}">{{item.text}}</li>
        </ul>
      </div>
    </div>
  </div>
  <div class="music-bottom">
    <div class="music">
      <div class="iconfont iconziyuan1" @click="prev"></div>
      <div class="iconfont iconbofang" v-if="!isPlay" @click="play"></div>
      <div class="iconfont iconstop" v-if="isPlay" @click="pause"></div>
      <div class="iconfont iconziyuan" @click="next"></div>
      <div class="musicinfo">
        <div class="info" v-if="music.length>0">
          <div class="nameauthor">{{music[xh].name}} - {{music[xh].author}}</div>
          <div class="time"><em>{{formatTime(curtime)}}</em> / <em>{{formatTime(music[xh].duration)}}</em></div>
        </div>
        <div class="info" v-else>
          <div class="nameauthor">-- - --</div>
          <div class="time"><em>00:00</em> / <em>00:00</em></div>
        </div>
        <div id="jd" class="jd"></div>
      </div>
      <div id="icolist" class="iconfont icongedan" @click.stop="exp=!exp"><i>{{music.length}}</i></div>
      <div class="iconfont iconyinliang" @click="volume=0" v-if="volume!=0"></div>
      <div style="color: #3eaf7c" class="iconfont iconjingyin" @click="volume=1" v-else></div>
      <div id="volume"></div>
    </div>
  </div>
</div>
<script src="vue.min.js"></script>
<script src="slider.js"></script>
<script src="https://y.gtimg.cn/music/h5/player/player.js?max_age=2592000"></script>
